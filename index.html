<!DOCTYPE html>
<html>
<head>
  <title>FlowSpace Credit Forecast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
    }

    .card {
      background: white;
      max-width: 680px;
      margin: auto;
      padding: 50px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo img {
      max-width: 200px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 40px;
    }

    label {
      font-weight: 600;
      font-size: 15px;
      display: block;
      margin-bottom: 8px;
      margin-top: 22px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      font-size: 15px;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: black;
    }

    button {
      width: 100%;
      margin-top: 30px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: black;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 40px;
      padding: 30px;
      background: #fafafa;
      border-radius: 18px;
      border: 1px solid #eee;
      display: none;
    }

    .big-number {
      font-size: 36px;
      font-weight: 700;
      margin: 10px 0 25px 0;
    }

    .footnote {
      font-size: 13px;
      color: #777;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="logo.png" alt="FlowSpace Logo">
  </div>

  <h1>Credit Forecast Calculator</h1>

  <label>1) How many desk bookings do you expect to make per week?</label>
  <input type="text" inputmode="numeric" id="desk_week" value="20">

  <label>Desk booking style</label>
  <select id="style">
    <option value="typical">Typical mix</option>
    <option value="mostly_full">Mostly full-day</option>
    <option value="mostly_6">Mostly 6-hour</option>
    <option value="mostly_4">Mostly 4-hour</option>
  </select>

  <label>2) How many meeting room bookings do you expect to make per week?</label>
  <input type="text" inputmode="numeric" id="meeting_week" value="3">

  <label>3) Average number of attendees per meeting?</label>
  <input type="text" inputmode="numeric" id="meeting_attendees" value="4">

  <label>Average meeting duration (hours)</label>
  <input type="text" inputmode="decimal" id="meeting_hours" value="2">

  <label>4) How many day office bookings per week?</label>
  <input type="text" inputmode="numeric" id="office_week" value="1">

  <label>5) Average attendees per day office booking?</label>
  <input type="text" inputmode="numeric" id="office_attendees" value="2">

  <button onclick="calculate()">Calculate Forecast</button>

  <div class="result" id="results"></div>

</div>

<script>
function num(id) {
  return parseFloat(document.getElementById(id).value) || 0;
}

function calculate() {

  const PRICE = 2.5;
  const VAT = 0.2;
  const WEEKS = 4.33;

  const FULL = 18;
  const SIX = Math.round(FULL * 0.75);
  const FOUR = Math.round(FULL * 0.6);

  const MEETING_RATE = 5;
  const DAYOFFICE_RATE = 20;

  const BUFFER = 0.1;
  const ROUND = 10;

  const deskWeek = num("desk_week");
  const meetingWeek = num("meeting_week");
  const meetingAttendees = num("meeting_attendees");
  const meetingHours = num("meeting_hours");
  const officeWeek = num("office_week");
  const officeAttendees = num("office_attendees");

  let mix = { full: 0.5, six: 0.3, four: 0.2 };
  const style = document.getElementById("style").value;

  if (style === "mostly_full") mix = { full: 0.8, six: 0.1, four: 0.1 };
  if (style === "mostly_6") mix = { full: 0.2, six: 0.7, four: 0.1 };
  if (style === "mostly_4") mix = { full: 0.2, six: 0.1, four: 0.7 };

  const deskMonth = deskWeek * WEEKS;
  const meetingMonth = meetingWeek * WEEKS;
  const officeMonth = officeWeek * WEEKS;

  const deskCredits = deskMonth *
    (mix.full * FULL + mix.six * SIX + mix.four * FOUR);

  const meetingCredits = meetingMonth *
    meetingAttendees * meetingHours * MEETING_RATE;

  const officeCredits = officeMonth *
    officeAttendees * DAYOFFICE_RATE;

  const total = deskCredits + meetingCredits + officeCredits;
  const buffered = total * (1 + BUFFER);
  const rounded = Math.ceil(buffered / ROUND) * ROUND;

  const exVat = rounded * PRICE;

  document.getElementById("results").style.display = "block";
  document.getElementById("results").innerHTML =
    "<div><b>Forecast number of credits required per month:</b></div>" +
    "<div class='big-number'>" + rounded + "</div>" +
    "<div><b>Price:</b> £" + exVat.toFixed(2) + " + VAT</div>" +
    "<div class='footnote'>Includes 10% buffer. Based on £2.50 per credit.</div>";
}
</script>

</body>
</html>
